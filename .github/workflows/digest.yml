name: Weekly Digest

on:
  schedule:
    # Sunday 6pm UTC (8pm CEST) - research
    - cron: '0 18 * * 0'
    # Monday 6am UTC (8am CEST) - send
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: both, research-only, or send-only'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - research-only
          - send-only
      user_email:
        description: 'Process a specific user (leave blank for all)'
        required: false
        type: string

jobs:
  send-digests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          PPLX_KEY: ${{ secrets.PPLX_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SAP_AICORE_AUTH_URL: ${{ secrets.SAP_AICORE_AUTH_URL }}
          SAP_AICORE_CLIENT_ID: ${{ secrets.SAP_AICORE_CLIENT_ID }}
          SAP_AICORE_CLIENT_SECRET: ${{ secrets.SAP_AICORE_CLIENT_SECRET }}
          SAP_AICORE_BASE_URL: ${{ secrets.SAP_AICORE_BASE_URL }}
          SAP_AICORE_RESOURCE_GROUP: ${{ secrets.SAP_AICORE_RESOURCE_GROUP }}
          AICORE_DEPLOYMENT_PPLX: ${{ secrets.AICORE_DEPLOYMENT_PPLX }}
          AICORE_DEPLOYMENT_GPT4O_MINI: ${{ secrets.AICORE_DEPLOYMENT_GPT4O_MINI }}
          LITELLM_URL: ${{ secrets.LITELLM_URL }}
          LITELLM_KEY: ${{ secrets.LITELLM_KEY }}
          ALLOWED_RECIPIENTS: ${{ secrets.ALLOWED_RECIPIENTS }}
        run: |
          MODE="${{ inputs.mode }}"
          EMAIL="${{ inputs.user_email }}"
          ARGS=""

          # Auto-detect mode from schedule if not manually set
          if [ -z "$MODE" ] || [ "$MODE" = "both" ]; then
            DAY=$(date -u +%u)
            if [ "$DAY" = "7" ]; then
              ARGS="--research-only"
            elif [ "$DAY" = "1" ]; then
              ARGS="--send-only"
            fi
          elif [ "$MODE" = "research-only" ]; then
            ARGS="--research-only"
          elif [ "$MODE" = "send-only" ]; then
            ARGS="--send-only"
          fi

          if [ -n "$EMAIL" ]; then
            ARGS="$ARGS --email $EMAIL"
          fi

          python run_digest.py $ARGS
